services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  minio:
    ports:
      - "${MINIO_API_PORT}:9000"
      # console TIDAK di-expose
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  app:
    env_file:
    - .env.prod
    ports:
      - "${APP_PORT}:3000"
    environment:
      APP_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M