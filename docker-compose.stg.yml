services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  minio:
    ports:
      - "${MINIO_API_PORT}:9000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  app:
    env_file:
    - .env.stg
    ports:
      - "${APP_PORT}:3000"
    environment:
      APP_ENV: staging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M