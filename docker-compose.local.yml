services:
  postgres:
    ports:
      - "5432:5432"

  pgbouncer:
    ports:
      - "6432:5432"

  minio:
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: ${PGADMIN_CONTAINER}
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: always

  app:
    env_file:
    - .env
    ports:
      - "${APP_PORT}:3000"
    environment:
      APP_ENV: development
    command: sh -c "
      sleep 5 &&
      ./migrate &&
      ./seed &&
      ./main"
    # hot reload pakai air jika tersedia
    # command: air